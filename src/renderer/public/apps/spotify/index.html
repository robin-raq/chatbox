<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify - ChatBridge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #121212; color: #fff; padding: 16px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .header-icon { font-size: 28px; }
    .header-title { font-size: 18px; font-weight: 700; }
    .header-sub { font-size: 12px; color: #b3b3b3; }
    .auth-banner { background: #282828; border-radius: 8px; padding: 16px; text-align: center; margin-bottom: 16px; }
    .auth-banner p { font-size: 13px; color: #b3b3b3; margin-bottom: 10px; }
    .auth-btn { padding: 10px 24px; font-size: 14px; font-weight: 600; border: none; border-radius: 20px; background: #1db954; color: white; cursor: pointer; }
    .auth-btn:hover { background: #1ed760; }
    .connected { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: #282828; border-radius: 8px; margin-bottom: 16px; }
    .connected-dot { width: 8px; height: 8px; background: #1db954; border-radius: 50%; }
    .connected-text { font-size: 13px; color: #b3b3b3; }
    .section-title { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 10px; }
    .track-list { list-style: none; }
    .track { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 4px; cursor: pointer; }
    .track:hover { background: #282828; }
    .track-num { width: 20px; text-align: right; font-size: 13px; color: #b3b3b3; }
    .track-art { width: 40px; height: 40px; background: #282828; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .track-info { flex: 1; }
    .track-name { font-size: 14px; font-weight: 500; }
    .track-artist { font-size: 12px; color: #b3b3b3; }
    .track-duration { font-size: 12px; color: #b3b3b3; }
    .play-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: #1db954; color: white; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .play-btn:hover { background: #1ed760; transform: scale(1.05); }
    .playing { color: #1db954; }
    .now-playing-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #181818; border-top: 1px solid #282828; padding: 8px 16px; display: none; align-items: center; gap: 12px; z-index: 100; }
    .now-playing-bar.active { display: flex; }
    .np-info { flex: 1; min-width: 0; }
    .np-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .np-artist { font-size: 11px; color: #b3b3b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .np-controls { display: flex; align-items: center; gap: 8px; }
    .np-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #1db954; color: white; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .np-btn:hover { background: #1ed760; }
    .np-btn.small { width: 28px; height: 28px; font-size: 12px; background: transparent; color: #b3b3b3; }
    .np-btn.small:hover { color: white; background: #333; }
    .playlist { background: #282828; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .playlist-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .playlist-meta { font-size: 12px; color: #b3b3b3; }
    .empty { text-align: center; padding: 40px; color: #b3b3b3; }
    .empty-icon { font-size: 40px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">🎵</span>
    <div>
      <div class="header-title">Spotify</div>
      <div class="header-sub">Music for studying</div>
    </div>
  </div>
  <div id="content">
    <div id="auth-section" class="auth-banner">
      <p>Connect your Spotify account to create playlists and search for music</p>
      <button class="auth-btn" onclick="connectSpotify()">Connect Spotify</button>
    </div>
    <div class="empty">
      <div class="empty-icon">🎧</div>
      <div>Ask the chatbot to find music or create a playlist</div>
    </div>
  </div>

  <div id="now-playing-bar" class="now-playing-bar">
    <div class="np-info">
      <div id="np-title" class="np-title">Not playing</div>
      <div id="np-artist" class="np-artist"></div>
    </div>
    <div class="np-controls">
      <button class="np-btn" id="np-toggle" onclick="togglePlayback()">⏸</button>
    </div>
  </div>

  <script src="https://sdk.scdn.co/spotify-player.js"></script>
  <script src="/apps/sdk/chatbridge-app-sdk.js"></script>
  <script>
    var accessToken = null;
    var refreshToken = null;
    var tokenExpiresAt = 0;
    var spotifyPlayer = null;
    var playerDeviceId = null;
    var playerReady = false;
    var currentPlaylist = null;
    var currentPlaylistId = null;
    var playlistTracks = [];
    var refreshPromise = null;

    function connectSpotify() {
      // Open OAuth popup — backend handles the redirect
      var popup = window.open('/api/spotify/auth', 'spotify_auth', 'width=500,height=700');
      // Listen for tokens from the callback page
      window.addEventListener('message', function handler(event) {
        if (event.data && event.data.type === 'spotify_auth') {
          window.removeEventListener('message', handler);
          var data = event.data.data;
          if (data.error) {
            showAuthError('Connection failed: ' + data.error);
            return;
          }
          accessToken = data.access_token;
          refreshToken = data.refresh_token;
          tokenExpiresAt = Date.now() + (data.expires_in * 1000);
          showConnected();
          initPlayer();
          ChatBridge.sendContextUpdate({ event: 'connected' });
        }
      });
    }

    function initPlayer() {
      if (!accessToken || spotifyPlayer) return;
      spotifyPlayer = new Spotify.Player({
        name: 'ChatBridge Player',
        getOAuthToken: function(cb) { cb(accessToken); },
        volume: 0.5,
      });
      spotifyPlayer.addListener('ready', function(data) {
        playerDeviceId = data.device_id;
        playerReady = true;
        console.log('[Spotify] Player ready, device:', playerDeviceId);
      });
      spotifyPlayer.addListener('not_ready', function() {
        playerReady = false;
        console.log('[Spotify] Player not ready');
      });
      spotifyPlayer.addListener('initialization_error', function(e) { console.error('[Spotify] Init error:', e.message); });
      spotifyPlayer.addListener('authentication_error', function(e) { console.error('[Spotify] Auth error:', e.message); });
      spotifyPlayer.addListener('account_error', function(e) { console.error('[Spotify] Account error (Premium required):', e.message); });
      spotifyPlayer.addListener('player_state_changed', function(state) {
        if (state && state.track_window && state.track_window.current_track) {
          var t = state.track_window.current_track;
          updateNowPlaying(t.name, t.artists.map(function(a){ return a.name; }).join(', '), !state.paused);
        } else {
          updateNowPlaying('', '', false);
        }
      });
      spotifyPlayer.connect();
    }

    // SDK ready callback — called by the Spotify SDK script
    window.onSpotifyWebPlaybackSDKReady = function() {
      console.log('[Spotify] SDK loaded');
      if (accessToken) initPlayer();
    };

    function showConnected() {
      var authSection = document.getElementById('auth-section');
      while (authSection.firstChild) authSection.removeChild(authSection.firstChild);
      var dot = document.createElement('span');
      dot.className = 'connected-dot';
      authSection.appendChild(dot);
      var text = document.createElement('span');
      text.className = 'connected-text';
      text.textContent = 'Connected to Spotify';
      authSection.appendChild(text);
      authSection.className = 'connected';
    }

    function showAuthError(msg) {
      var authSection = document.getElementById('auth-section');
      while (authSection.firstChild) authSection.removeChild(authSection.firstChild);
      var p = document.createElement('p');
      p.textContent = msg;
      p.style.color = '#ef4444';
      p.style.fontSize = '13px';
      authSection.appendChild(p);
      var btn = document.createElement('button');
      btn.className = 'auth-btn';
      btn.textContent = 'Try Again';
      btn.onclick = connectSpotify;
      authSection.appendChild(btn);
    }

    function ensureToken() {
      if (!accessToken) return Promise.reject(new Error('Not connected'));
      if (Date.now() < tokenExpiresAt - 60000) return Promise.resolve();
      // Token expired or expiring soon — refresh
      if (refreshPromise) return refreshPromise;
      refreshPromise = fetch('/api/spotify/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: refreshToken }),
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.access_token) {
          accessToken = data.access_token;
          tokenExpiresAt = Date.now() + (data.expires_in * 1000);
        }
        refreshPromise = null;
      })
      .catch(function(err) {
        refreshPromise = null;
        throw err;
      });
      return refreshPromise;
    }

    function msToTime(ms) {
      var min = Math.floor(ms / 60000);
      var sec = Math.floor((ms % 60000) / 1000);
      return min + ':' + (sec < 10 ? '0' : '') + sec;
    }

    var isPlaying = false;
    var currentTrackName = '';
    var currentTrackArtist = '';

    function updateNowPlaying(name, artist, playing) {
      currentTrackName = name || '';
      currentTrackArtist = artist || '';
      isPlaying = playing;
      var bar = document.getElementById('now-playing-bar');
      document.getElementById('np-title').textContent = name || 'Not playing';
      document.getElementById('np-artist').textContent = artist || '';
      document.getElementById('np-toggle').textContent = playing ? '⏸' : '▶';
      bar.className = name ? 'now-playing-bar active' : 'now-playing-bar';
    }

    function togglePlayback() {
      if (spotifyPlayer) {
        spotifyPlayer.togglePlay().then(function() {
          isPlaying = !isPlaying;
          document.getElementById('np-toggle').textContent = isPlaying ? '⏸' : '▶';
        });
      }
    }

    function playTrack(uri, name, artist) {
      if (!accessToken) return;
      ensureToken().then(function() {
        var body = { uris: [uri] };
        var url = '/api/spotify/play';
        if (playerDeviceId) {
          url += '?device_id=' + playerDeviceId;
        }
        return fetch(url, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken },
          body: JSON.stringify(body),
        });
      }).then(function(res) {
        if (res && res.ok) {
          updateNowPlaying(name || 'Playing', artist || '', true);
        } else if (res) {
          return res.json().then(function(d) {
            var msg = (d.error && d.error.message) || 'Playback failed';
            if (msg.indexOf('No active device') >= 0 || msg.indexOf('Player command failed') >= 0) {
              alert('Please wait a moment for the player to connect, then try again.');
            }
          });
        }
      });
    }

    function renderTracks(tracks, title) {
      var content = document.getElementById('content');
      var authSection = document.getElementById('auth-section');
      while (content.firstChild) content.removeChild(content.firstChild);
      content.appendChild(authSection);

      var sTitle = document.createElement('div');
      sTitle.className = 'section-title';
      sTitle.textContent = title || 'Search Results';
      content.appendChild(sTitle);

      var list = document.createElement('ul');
      list.className = 'track-list';
      tracks.forEach(function(track, i) {
        var li = document.createElement('li');
        li.className = 'track';

        // Play button
        if (track.uri) {
          var playBtn = document.createElement('button');
          playBtn.className = 'play-btn';
          playBtn.textContent = '▶';
          playBtn.onclick = (function(t) { return function() { playTrack(t.uri, t.name, t.artist); }; })(track);
          li.appendChild(playBtn);
        } else {
          var num = document.createElement('span');
          num.className = 'track-num';
          num.textContent = (i + 1).toString();
          li.appendChild(num);
        }

        var art = document.createElement('div');
        art.className = 'track-art';
        art.textContent = '🎵';
        li.appendChild(art);

        var info = document.createElement('div');
        info.className = 'track-info';
        var name = document.createElement('div');
        name.className = 'track-name';
        name.textContent = track.name;
        info.appendChild(name);
        var artist = document.createElement('div');
        artist.className = 'track-artist';
        artist.textContent = track.artist;
        info.appendChild(artist);
        li.appendChild(info);

        var dur = document.createElement('span');
        dur.className = 'track-duration';
        dur.textContent = track.duration || '3:30';
        li.appendChild(dur);

        list.appendChild(li);
      });
      content.appendChild(list);
    }

    function renderPlaylist(name, tracks) {
      var content = document.getElementById('content');
      var authSection = document.getElementById('auth-section');
      while (content.firstChild) content.removeChild(content.firstChild);
      content.appendChild(authSection);

      var pl = document.createElement('div');
      pl.className = 'playlist';
      var plName = document.createElement('div');
      plName.className = 'playlist-name';
      plName.textContent = name;
      pl.appendChild(plName);
      var plMeta = document.createElement('div');
      plMeta.className = 'playlist-meta';
      plMeta.textContent = tracks.length + ' tracks';
      pl.appendChild(plMeta);
      content.appendChild(pl);

      renderTracks(tracks, 'Playlist Tracks');
    }

    // Track URI cache for add_to_playlist
    var lastSearchResults = [];

    // Tool handlers — real Spotify API via backend proxy
    ChatBridge.onToolCall('search_tracks', function(params) {
      if (!accessToken) {
        // Auto-trigger the connect flow
        connectSpotify();
        return 'The Spotify authorization popup has opened. Tell the user to log in to Spotify in the popup window and authorize the app. Once they see "Connected" in the side panel, ask them to say "ready" and then retry this tool call.';
      }
      var query = params.query || '';
      return ensureToken().then(function() {
        return fetch('/api/spotify/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken },
          body: JSON.stringify({ query: query, type: 'track', limit: 10 }),
        });
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var items = (data.tracks && data.tracks.items) || [];
        lastSearchResults = items;
        var tracks = items.map(function(t) {
          return {
            name: t.name,
            artist: t.artists.map(function(a) { return a.name; }).join(', '),
            duration: msToTime(t.duration_ms),
            uri: t.uri,
          };
        });
        renderTracks(tracks, 'Results for "' + query + '"');
        return 'Found ' + tracks.length + ' tracks for "' + query + '": ' + tracks.slice(0, 5).map(function(t) { return t.name + ' by ' + t.artist; }).join(', ') + '.';
      })
      .catch(function(err) {
        return 'Spotify search failed: ' + err.message;
      });
    });

    ChatBridge.onToolCall('create_playlist', function(params) {
      console.log('[Spotify] create_playlist called, accessToken:', accessToken ? 'SET (' + accessToken.substring(0,10) + '...)' : 'NULL');
      if (!accessToken) {
        connectSpotify();
        return 'The Spotify authorization popup has opened. Tell the user to log in to Spotify in the popup window and authorize the app. Once they see "Connected" in the side panel, ask them to say "ready" and then retry this tool call.';
      }
      var name = params.name || 'My Playlist';
      console.log('[Spotify] Creating playlist:', name, 'with token:', accessToken.substring(0,10) + '...');
      return ensureToken().then(function() {
        return fetch('/api/spotify/playlists', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken },
          body: JSON.stringify({ name: name, description: 'Created by ChatBridge' }),
        });
      })
      .then(function(res) {
        console.log('[Spotify] Playlist API response status:', res.status);
        return res.json();
      })
      .then(function(playlist) {
        console.log('[Spotify] Create playlist response:', JSON.stringify(playlist));
        if (playlist.error) return 'Failed to create playlist: ' + JSON.stringify(playlist.error);
        currentPlaylist = playlist.name;
        currentPlaylistId = playlist.id;
        playlistTracks = [];
        renderPlaylist(currentPlaylist, playlistTracks);
        return 'Created playlist "' + currentPlaylist + '" on Spotify. Use add_to_playlist to add tracks.';
      })
      .catch(function(err) {
        return 'Failed to create playlist: ' + err.message;
      });
    });

    ChatBridge.onToolCall('add_to_playlist', function(params) {
      if (!accessToken) {
        return 'User needs to connect their Spotify account first.';
      }
      if (!currentPlaylistId) {
        return 'No playlist is active. Create one first with create_playlist.';
      }
      var trackName = params.track_name || '';
      var artist = params.artist || '';

      // Find track URI from last search results
      var match = lastSearchResults.find(function(t) {
        var nameMatch = t.name.toLowerCase().indexOf(trackName.toLowerCase()) >= 0;
        var artistMatch = !artist || t.artists.some(function(a) { return a.name.toLowerCase().indexOf(artist.toLowerCase()) >= 0; });
        return nameMatch && artistMatch;
      });

      if (!match) {
        // Search for the track first
        return ensureToken().then(function() {
          return fetch('/api/spotify/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken },
            body: JSON.stringify({ query: trackName + ' ' + artist, type: 'track', limit: 1 }),
          });
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          var items = (data.tracks && data.tracks.items) || [];
          if (items.length === 0) return 'Could not find track "' + trackName + '"';
          return addTrackToPlaylist(items[0]);
        });
      }

      return ensureToken().then(function() { return addTrackToPlaylist(match); });
    });

    function addTrackToPlaylist(track) {
      return fetch('/api/spotify/playlists/' + currentPlaylistId + '/tracks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken },
        body: JSON.stringify({ uris: [track.uri] }),
      })
      .then(function(res) { return res.json(); })
      .then(function() {
        var t = { name: track.name, artist: track.artists.map(function(a) { return a.name; }).join(', '), duration: msToTime(track.duration_ms), uri: track.uri };
        playlistTracks.push(t);
        renderPlaylist(currentPlaylist, playlistTracks);
        return 'Added "' + t.name + '" by ' + t.artist + ' to "' + currentPlaylist + '". Playlist now has ' + playlistTracks.length + ' tracks.';
      })
      .catch(function(err) {
        return 'Failed to add track: ' + err.message;
      });
    }
  </script>
</body>
</html>
