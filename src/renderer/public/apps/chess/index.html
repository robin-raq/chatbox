<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess - ChatBridge</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; padding: 16px; }
    .status { text-align: center; padding: 8px; font-size: 14px; color: #334155; margin-bottom: 12px; font-weight: 500; }
    .board { display: grid; grid-template-columns: repeat(8, 1fr); width: 100%; max-width: 380px; margin: 0 auto; border: 2px solid #1a1f36; border-radius: 4px; overflow: hidden; }
    .square { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 32px; cursor: pointer; user-select: none; transition: background 0.1s; }
    .square.light { background: #f0d9b5; }
    .square.dark { background: #b58863; }
    .square.selected { background: #ffff00 !important; }
    .square.legal { position: relative; }
    .square.legal::after { content: ''; position: absolute; width: 30%; height: 30%; background: rgba(0,0,0,0.2); border-radius: 50%; }
    .square:hover { opacity: 0.85; }
    .info { text-align: center; margin-top: 12px; font-size: 12px; color: #64748b; }
    .game-over { text-align: center; padding: 12px; font-size: 16px; font-weight: 600; color: #1a1f36; background: #e0e7ff; border-radius: 6px; margin-bottom: 12px; }
    .controls { text-align: center; margin-top: 12px; }
    .controls button { padding: 6px 16px; font-size: 13px; border: 1px solid #cbd5e1; border-radius: 4px; background: white; cursor: pointer; }
    .controls button:hover { background: #f1f5f9; }
  </style>
</head>
<body>
  <div id="status" class="status">Waiting for game to start...</div>
  <div id="board" class="board"></div>
  <div id="info" class="info"></div>
  <div class="controls">
    <button onclick="requestNewGame()">New Game</button>
  </div>

  <script src="/apps/sdk/chatbridge-app-sdk.js"></script>
  <script>
    var game = null;
    var selectedSquare = null;
    var legalMoves = [];
    var playerColor = 'w';

    var PIECES = { p: '\u265F', r: '\u265C', n: '\u265E', b: '\u265D', q: '\u265B', k: '\u265A',
                   P: '\u2659', R: '\u2656', N: '\u2658', B: '\u2657', Q: '\u2655', K: '\u2654' };

    function renderBoard() {
      var board = document.getElementById('board');
      // Clear board safely using DOM methods
      while (board.firstChild) { board.removeChild(board.firstChild); }
      for (var row = 0; row < 8; row++) {
        for (var col = 0; col < 8; col++) {
          var sq = String.fromCharCode(97 + col) + (8 - row);
          var piece = game.get(sq);
          var div = document.createElement('div');
          div.className = 'square ' + ((row + col) % 2 === 0 ? 'light' : 'dark');
          if (selectedSquare === sq) div.className += ' selected';
          if (legalMoves.indexOf(sq) >= 0) div.className += ' legal';
          div.textContent = piece ? PIECES[piece.color === 'w' ? piece.type.toUpperCase() : piece.type] : '';
          div.dataset.square = sq;
          div.addEventListener('click', onSquareClick);
          board.appendChild(div);
        }
      }
      updateStatus();
    }

    function updateStatus() {
      var status = document.getElementById('status');
      var info = document.getElementById('info');
      if (game.game_over()) {
        if (game.in_checkmate()) status.textContent = (game.turn() === 'w' ? 'Black' : 'White') + ' wins by checkmate!';
        else if (game.in_stalemate()) status.textContent = 'Draw by stalemate';
        else if (game.in_draw()) status.textContent = 'Draw';
        status.className = 'game-over';
      } else {
        status.textContent = (game.turn() === 'w' ? 'White' : 'Black') + ' to move';
        if (game.in_check()) status.textContent += ' (check!)';
        status.className = 'status';
      }
      var history = game.history();
      info.textContent = history.length > 0 ? 'Moves: ' + history.join(', ') : '';
    }

    function onSquareClick(e) {
      var sq = e.currentTarget.dataset.square;
      if (selectedSquare) {
        var move = game.move({ from: selectedSquare, to: sq, promotion: 'q' });
        if (move) {
          selectedSquare = null;
          legalMoves = [];
          renderBoard();
          sendMoveUpdate(move);
          checkGameOver();
          return;
        }
      }
      var piece = game.get(sq);
      if (piece && piece.color === game.turn()) {
        selectedSquare = sq;
        var moves = game.moves({ square: sq, verbose: true });
        legalMoves = moves.map(function(m) { return m.to; });
      } else {
        selectedSquare = null;
        legalMoves = [];
      }
      renderBoard();
    }

    function sendMoveUpdate(move) {
      ChatBridge.sendContextUpdate({
        fen: game.fen(),
        last_move: move.san,
        turn: game.turn() === 'w' ? 'white' : 'black',
        move_number: Math.ceil(game.history().length / 2),
        in_check: game.in_check(),
      });
    }

    function checkGameOver() {
      if (game.game_over()) {
        var result = {};
        if (game.in_checkmate()) result = { outcome: 'checkmate', winner: game.turn() === 'w' ? 'black' : 'white' };
        else if (game.in_stalemate()) result = { outcome: 'stalemate' };
        else result = { outcome: 'draw' };
        result.total_moves = game.history().length;
        result.final_fen = game.fen();
        ChatBridge.sendCompletion(result);
      }
    }

    function requestNewGame() {
      game = new Chess();
      selectedSquare = null;
      legalMoves = [];
      renderBoard();
      ChatBridge.sendContextUpdate({ fen: game.fen(), turn: 'white', move_number: 0, event: 'new_game' });
    }

    // Register tool handlers
    ChatBridge.onToolCall('start_game', function(params) {
      game = new Chess();
      playerColor = (params.color === 'black') ? 'b' : 'w';
      selectedSquare = null;
      legalMoves = [];
      renderBoard();
      return 'Chess game started. The user is playing as ' + (playerColor === 'w' ? 'white' : 'black') + '. An interactive board is visible in the side panel where they can click pieces to move. White moves first.';
    });

    ChatBridge.onToolCall('make_move', function(params) {
      if (!game) return { error: 'No game in progress' };
      var move = game.move({ from: params.from, to: params.to, promotion: params.promotion || 'q' });
      if (!move) {
        var moveSan = game.move(params.move || params.san);
        if (!moveSan) return { error: 'Invalid move: ' + (params.from ? params.from + '-' + params.to : params.move) };
        move = moveSan;
      }
      selectedSquare = null;
      legalMoves = [];
      renderBoard();
      checkGameOver();
      return { fen: game.fen(), move: move.san, game_over: game.game_over() };
    });

    ChatBridge.onToolCall('get_board_state', function() {
      if (!game) return { error: 'No game in progress' };
      var h = game.history();
      var turn = game.turn() === 'w' ? 'White' : 'Black';
      var status = turn + ' to move.';
      if (game.in_check()) status = turn + ' is in check!';
      if (game.game_over()) {
        if (game.in_checkmate()) status = (game.turn() === 'w' ? 'Black' : 'White') + ' wins by checkmate!';
        else status = 'Game ended in a draw.';
      }
      return status + ' Moves played: ' + h.length + '. Last moves: ' + h.slice(-6).join(', ') + '. Position (FEN): ' + game.fen();
    });

    ChatBridge.onToolCall('get_legal_moves', function() {
      if (!game) return { error: 'No game in progress' };
      return { moves: game.moves(), fen: game.fen() };
    });

    // Initialize with a default board
    game = new Chess();
    renderBoard();
  </script>
</body>
</html>
