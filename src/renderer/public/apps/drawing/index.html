<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excalidraw - ChatBridge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    .toolbar { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: #f8f9fa; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
    .toolbar-title { font-size: 13px; font-weight: 600; color: #334155; }
    .toolbar-hint { font-size: 11px; color: #94a3b8; margin-left: auto; }
    iframe { flex: 1; border: 0; width: 100%; }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="toolbar-title">Excalidraw Whiteboard</span>
    <span class="toolbar-hint">Draw diagrams, sketch ideas, visualize concepts</span>
  </div>
  <iframe id="excalidraw" src="https://excalidraw.com" allow="clipboard-read; clipboard-write"></iframe>

  <script src="/apps/sdk/chatbridge-app-sdk.js"></script>
  <script>
    // Tool handlers — Excalidraw runs in a nested iframe so we can't
    // directly access its state. Tools provide metadata and signals.

    ChatBridge.onToolCall('open_whiteboard', function(params) {
      return 'Excalidraw whiteboard is now open in the side panel. The student can draw diagrams, sketch ideas, and visualize concepts. Tools include pen, shapes, arrows, text, and more. When done, they can tell you in the chat.';
    });

    ChatBridge.onToolCall('get_canvas_state', function() {
      return 'The Excalidraw whiteboard is active. The student is drawing in the side panel. Ask them to describe what they drew or take a screenshot to share.';
    });

    ChatBridge.onToolCall('clear_canvas', function() {
      // Reload the Excalidraw iframe to clear
      document.getElementById('excalidraw').src = 'https://excalidraw.com';
      return 'Whiteboard cleared. A fresh canvas is ready.';
    });
  </script>
</body>
</html>
